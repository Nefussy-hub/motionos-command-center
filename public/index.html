// Monitor endpoint for scheduled health checks
const MONITOR_URL = '/.netlify/functions/monitor';

const ClaudePanel = ({ isOpen, onToggle }) => {
  const [messages, setMessages] = useState([
    { role:'assistant', content:"Command Center online. I'm monitoring MotionOS — all systems nominal.\n\n**Quick status:**\n• Sprint 10: 42% (7/18 tasks, 1 blocked)\n• Tests: 1,323/1,323 passing\n• Production: v0.9.4 live\n• 1 alert: iPhone camera FORM score\n\nWhat would you like to focus on?" },
  ]);
  const [input, setInput] = useState('');
  const [isTyping, setIsTyping] = useState(false);
  const [activeTab, setActiveTab] = useState('chat'); // chat | alerts | quick
  const messagesEndRef = useRef(null);
  const inputRef = useRef(null);

  useEffect(() => {
    messagesEndRef.current?.scrollIntoView({ behavior:'smooth' });
  }, [messages]);

  // Conversation history for Claude API (excludes the welcome message)
  const apiMessagesRef = useRef([]);

  const sendToClaudeAPI = async (userMsg) => {
    setIsTyping(true);

    // Add user message to API history
    apiMessagesRef.current.push({ role: 'user', content: userMsg });

    try {
      const res = await fetch('/.netlify/functions/claude', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: apiMessagesRef.current,
          max_tokens: 1024,
        }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || `API error ${res.status}`);
      }

      const data = await res.json();
      const assistantMsg = data.content?.[0]?.text || 'No response received.';

      // Add assistant response to history
      apiMessagesRef.current.push({ role: 'assistant', content: assistantMsg });

      setIsTyping(false);
      setMessages(prev => [...prev, { role: 'assistant', content: assistantMsg }]);
    } catch (error) {
      setIsTyping(false);
      setMessages(prev => [...prev, {
        role: 'assistant',
        content: `**Connection Error:** ${error.message}\n\nCheck that ANTHROPIC_API_KEY is set in Netlify environment variables.`
      }]);
    }
  };

  const handleSend = () => {
    if (!input.trim()) return;
    const userMsg = input.trim();
    setMessages(prev => [...prev, { role:'user', content:userMsg }]);
    setInput('');
    sendToClaudeAPI(userMsg);
  };

  const quickActions = [
    { label:'Sprint Status', query:'What is the sprint progress?' },
    { label:'Test Health', query:'How are the tests?' },
    { label:'Blockers', query:'What are the current blockers?' },
    { label:'Deployments', query:'Show deployment status' },
  ];

  // Render markdown-like bold
  const renderContent = (text) => {
    return text.split('\n').map((line, i) => {
      const parts = line.split(/(\*\*[^*]+\*\*)/g).map((part, j) => {
        if (part.startsWith('**') && part.endsWith('**')) {
          return <strong key={j} className="text-white font-semibold">{part.slice(2,-2)}</strong>;
        }
        return part;
      });
      return <div key={i} className={line === '' ? 'h-2' : ''}>{parts}</div>;
    });
  };

  if (!isOpen) return null;

  return (
    <div className="fixed right-0 top-0 bottom-0 w-full max-w-md z-50 flex flex-col bg-surface-container-lowest border-l border-white/5 shadow-2xl fade-in">
      {/* Header */}
      <div className="flex items-center justify-between px-4 py-3 border-b border-white/5 bg-surface-container-low/50 backdrop-blur-xl">
        <div className="flex items-center gap-3">
          <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-primary/20 to-secondary/20 flex items-center justify-center">
            <Icon name="smart_toy" className="text-primary text-base" fill />
          </div>
          <div>
            <div className="font-headline font-bold text-xs">Claude Command</div>
            <div className="flex items-center gap-1.5">
              <span className="w-1.5 h-1.5 rounded-full bg-primary pulse-dot"></span>
              <span className="font-mono text-[8px] text-primary">CONNECTED</span>
            </div>
          </div>
        </div>
        <div className="flex items-center gap-1">
          {/* Tab switcher */}
          {['chat','alerts'].map(tab => (
            <button key={tab} onClick={() => setActiveTab(tab)}
              className={`px-3 py-1.5 rounded-md font-mono text-[9px] font-bold uppercase transition-all ${
                activeTab===tab ? 'bg-white/10 text-white' : 'text-on-surface-variant hover:text-white'
              }`}>
              {tab}
            </button>
          ))}
          <button onClick={onToggle} className="ml-2 p-1.5 rounded-md hover:bg-white/5 transition-colors">
            <Icon name="close" className="text-on-surface-variant text-base" />
          </button>
        </div>
      </div>

      {activeTab === 'chat' ? (
        <>
          {/* Messages */}
          <div className="flex-1 overflow-y-auto px-4 py-3 space-y-3">
            {messages.map((m, i) => (
              <div key={i} className={`msg-enter flex ${m.role==='user'?'justify-end':'justify-start'}`}>
                <div className={`max-w-[85%] rounded-xl px-3.5 py-2.5 ${
                  m.role==='user'
                    ? 'bg-primary/15 border border-primary/20 text-white'
                    : 'bg-surface-container-high/50 border border-white/5 text-on-surface-variant'
                }`}>
                  <div className="font-label text-xs leading-relaxed whitespace-pre-wrap">
                    {renderContent(m.content)}
                  </div>
                </div>
              </div>
            ))}
            {isTyping && (
              <div className="flex justify-start">
                <div className="bg-surface-container-high/50 border border-white/5 rounded-xl px-4 py-3">
                  <div className="typing-dots"><span></span><span></span><span></span></div>
                </div>
              </div>
            )}
            <div ref={messagesEndRef} />
          </div>

          {/* Quick actions */}
          <div className="px-4 py-2 flex gap-1.5 overflow-x-auto">
            {quickActions.map((a, i) => (
              <button key={i} onClick={() => {
                setMessages(prev => [...prev, { role:'user', content:a.query }]);
                sendToClaudeAPI(a.query);
              }}
                className="flex-shrink-0 px-3 py-1.5 rounded-full bg-white/5 border border-white/5 font-mono text-[9px] text-on-surface-variant hover:text-white hover:bg-white/10 transition-all">
                {a.label}
              </button>
            ))}
          </div>

          {/* Input */}
          <div className="px-4 py-3 border-t border-white/5 bg-surface-container-low/30">
            <div className="flex items-center gap-2 bg-surface-container-high/50 rounded-xl px-3 py-2 border border-white/5 focus-within:border-primary/30 transition-colors">
              <input
                ref={inputRef}
                value={input}
                onChange={e => setInput(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && handleSend()}
                placeholder="Ask about sprints, tests, teams..."
                className="flex-1 bg-transparent text-white text-xs font-label placeholder:text-on-surface-variant/40 outline-none"
              />
              <button onClick={handleSend} className={`p-1.5 rounded-lg transition-all ${input.trim() ? 'bg-primary text-on-primary' : 'text-on-surface-variant/30'}`}>
                <Icon name="send" className="text-sm" />
              </button>
            </div>
          </div>
        </>
      ) : (
        /* Alerts Tab */
        <div className="flex-1 overflow-y-auto px-4 py-3 space-y-2">
          <div className="flex items-center gap-2 mb-3">
            <Icon name="notifications_active" className="text-tertiary text-base" />
            <span className="font-headline font-bold text-xs uppercase tracking-wide">Auto-Monitor Alerts</span>
          </div>
          {AUTO_ALERTS.map((a, i) => {
            const colors = {
              info: { bg:'bg-secondary/5', border:'border-secondary/15', icon:'info', iconColor:'text-secondary' },
              warning: { bg:'bg-tertiary/5', border:'border-tertiary/15', icon:'warning', iconColor:'text-tertiary' },
              success: { bg:'bg-primary/5', border:'border-primary/15', icon:'check_circle', iconColor:'text-primary' },
              error: { bg:'bg-error/5', border:'border-error/15', icon:'error', iconColor:'text-error' },
            };
            const c = colors[a.severity];
            return (
              <div key={i} className={`${c.bg} ${c.border} border rounded-xl p-3 flex items-start gap-2.5`}>
                <Icon name={c.icon} className={`${c.iconColor} text-base mt-0.5`} fill />
                <div className="flex-1">
                  <div className="font-label text-xs text-white/80 leading-snug">{a.msg}</div>
                  <div className="font-mono text-[9px] text-on-surface-variant/50 mt-1">{a.time}</div>
                </div>
              </div>
            );
          })}
          <div className="mt-4 p-3 rounded-xl bg-white/[.02] border border-white/[.04]">
            <div className="font-label text-[10px] text-on-surface-variant/60 mb-2 uppercase tracking-widest">Auto-monitoring checks</div>
            {[
              { check:'Test suite health', status:'pass', interval:'Every 30m' },
              { check:'Deployment status', status:'pass', interval:'Every 5m' },
              { check:'Sprint velocity', status:'pass', interval:'Every 1h' },
              { check:'Agent heartbeats', status:'pass', interval:'Every 15s' },
              { check:'FormEnvelope coverage', status:'warn', interval:'Every 2h' },
            ].map((c, i) => (
              <div key={i} className="flex items-center justify-between py-1.5 border-b border-white/[.03] last:border-0">
                <span className="font-label text-[10px] text-on-surface-variant">{c.check}</span>
                <div className="flex items-center gap-2">
                  <span className="font-mono text-[8px] text-on-surface-variant/40">{c.interval}</span>
                  <span className={`w-1.5 h-1.5 rounded-full ${c.status==='pass'?'bg-primary':'bg-tertiary pulse-dot'}`} />
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
};

// ============================================================
// MAIN APP
// ============================================================
const App = () => {
  const [claudeOpen, setClaudeOpen] = useState(false);
  const [now, setNow] = useState(new Date());

  useEffect(() => {
    const iv = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(iv);
  }, []);

  return (
    <div className={`min-h-screen bg-background transition-all ${claudeOpen ? 'mr-[28rem]' : ''}`}>
      {/* Scanner line decoration */}
      <div className="fixed inset-0 pointer-events-none z-0 overflow-hidden opacity-20">
        <div className="scanner-line absolute left-0 w-full"></div>
      </div>

      {/* TOP BAR */}
      <header className="sticky top-0 z-40 flex items-center justify-between px-6 py-4 bg-surface/80 backdrop-blur-xl border-b border-white/[.04]">
        <div className="flex items-center gap-4">
          <div className="flex items-center gap-2">
            <div className="w-8 h-8 rounded-lg kinetic-gradient flex items-center justify-center">
              <Icon name="monitor_heart" className="text-on-primary text-base" fill />
            </div>
            <div>
              <h1 className="font-headline font-black text-sm tracking-tighter uppercase">
                MotionOS <span className="text-primary text-[9px] tracking-widest ml-1">COMMAND</span>
              </h1>
              <div className="font-mono text-[9px] text-on-surface-variant/50">
                {now.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})} · {now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}
              </div>
            </div>
          </div>
        </div>

        <div className="flex items-center gap-2">
          {/* System status pills */}
          <div className="hidden md:flex items-center gap-2 mr-4">
            <div className="flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-primary/8 border border-primary/15">
              <span className="w-1.5 h-1.5 rounded-full bg-primary pulse-dot"></span>
              <span className="font-mono text-[8px] text-primary font-bold">PROD LIVE</span>
            </div>
            <div className="flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-primary/8 border border-primary/15">
              <span className="w-1.5 h-1.5 rounded-full bg-primary"></span>
              <span className="font-mono text-[8px] text-primary font-bold">1,323 TESTS</span>
            </div>
            <div className="flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-tertiary/8 border border-tertiary/15">
              <span className="w-1.5 h-1.5 rounded-full bg-tertiary pulse-dot"></span>
              <span className="font-mono text-[8px] text-tertiary font-bold">1 BLOCKED</span>
            </div>
          </div>

          {/* Claude toggle */}
          <button onClick={() => setClaudeOpen(!claudeOpen)}
            className={`flex items-center gap-2 px-4 py-2 rounded-xl font-headline font-bold text-[11px] uppercase tracking-wider transition-all active:scale-95 ${
              claudeOpen
                ? 'bg-primary text-on-primary glow-primary'
                : 'bg-surface-container-high border border-white/10 text-white hover:border-primary/30'
            }`}>
            <Icon name="smart_toy" className="text-sm" fill />
            Claude AI
          </button>
        </div>
      </header>

      {/* MAIN GRID */}
      <main className="relative z-10 p-6 max-w-[1400px] mx-auto">
        {/* Key metrics */}
        <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6 fade-in">
          <MetricCard label="Sprint Progress" value="42%" sub="Sprint 10 · 7/18 tasks" icon="sprint" color="primary" trend={8} />
          <MetricCard label="Tests Passing" value="1,323" sub="33 files · 0 failures" icon="check_circle" color="primary" trend={15} />
          <MetricCard label="Form Envelopes" value="5/8" sub="62.5% complete" icon="accessibility_new" color="secondary" trend={25} />
          <MetricCard label="Active Agents" value="13" sub="3 teams running" icon="smart_toy" color="tertiary" />
        </div>

        {/* Two-column layout */}
        <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
          {/* Left column — 2/3 */}
          <div className="lg:col-span-2 space-y-4">
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <SprintTracker />
              <TestHealth />
            </div>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <DeploymentStatus />
              <FormEnvelopes />
            </div>
          </div>

          {/* Right column — 1/3 */}
          <div className="space-y-4">
            <TeamStatus />
            <ActivityFeed />
          </div>
        </div>

        {/* Architecture badges */}
        <div className="mt-6 flex flex-wrap items-center gap-2 opacity-50">
          {['On-Device Processing','Form Envelope DB','Silence Protocol','Bridge Module','MediaPipe/MoveNet','17 Joints · 64 Muscles'].map((tag,i) => (
            <span key={i} className="px-3 py-1.5 rounded-full border border-white/5 font-mono text-[8px] text-on-surface-variant uppercase tracking-widest">
              {tag}
            </span>
          ))}
        </div>
      </main>

      {/* Claude Panel */}
      <ClaudePanel isOpen={claudeOpen} onToggle={() => setClaudeOpen(false)} />
    </div>
  );
};

createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
